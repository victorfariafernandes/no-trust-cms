name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

jobs:
  backend:
    name: Docker Image → ghcr.io
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/dopad-backend:${{ github.ref_name }}
            ghcr.io/${{ github.repository_owner }}/dopad-backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  frontend:
    name: Static Bundle → Release Asset
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install dependencies
        working-directory: frontend
        run: pnpm install --frozen-lockfile

      - name: Build
        working-directory: frontend
        run: pnpm build
        env:
          NEXT_STATIC_EXPORT: "1"
          NEXT_PUBLIC_API_URL: ${{ vars.NEXT_PUBLIC_API_URL }}

      - name: Compress
        run: tar -czf frontend-${{ github.ref_name }}.tar.gz -C frontend/out .

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: frontend-${{ github.ref_name }}.tar.gz
